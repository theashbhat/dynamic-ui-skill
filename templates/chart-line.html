<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            padding: 24px;
            background: #f5f5f5;
            font-size: 27px;
        }
        {{THEME_CSS}}
        .chart-container {
            background: var(--bg-card, white);
            border-radius: var(--border-radius, 20px);
            padding: 36px;
            box-shadow: var(--shadow, 0 6px 20px rgba(0,0,0,0.12));
        }
        .chart-title {
            font-size: 36px;
            font-weight: 800;
            color: var(--text-primary, #333);
            margin-bottom: 8px;
            text-align: center;
            background: var(--title-gradient, linear-gradient(135deg, #667eea 0%, #764ba2 100%));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .chart-subtitle {
            font-size: 16px;
            color: var(--text-secondary, #666);
            text-align: center;
            margin-bottom: 28px;
            letter-spacing: 0.5px;
        }
        .chart-area {
            position: relative;
            height: 340px;
        }
    </style>
    <script>{{CHARTJS_SOURCE}}</script>
</head>
<body>
    <div class="chart-container">
        <div class="chart-title">{{TITLE}}</div>
        <div class="chart-subtitle">{{SUBTITLE}}</div>
        <div class="chart-area">
            <canvas id="lineChart"></canvas>
        </div>
    </div>
    <script>
        const ctx = document.getElementById('lineChart').getContext('2d');
        const labels = {{LABELS_JSON}};
        const datasets = {{DATASETS_JSON}};

        // Build Chart.js datasets
        const chartDatasets = datasets.map((ds, i) => {
            const colors = [
                { line: '#667eea', fill: 'rgba(102, 126, 234, 0.15)' },
                { line: '#f093fb', fill: 'rgba(240, 147, 251, 0.15)' },
                { line: '#43e97b', fill: 'rgba(67, 233, 123, 0.15)' },
                { line: '#fa709a', fill: 'rgba(250, 112, 154, 0.15)' },
            ];
            const c = colors[i % colors.length];
            return {
                label: ds.label || ('Series ' + (i + 1)),
                data: ds.values,
                borderColor: ds.color || c.line,
                backgroundColor: ds.fillColor || c.fill,
                fill: ds.fill !== undefined ? ds.fill : true,
                tension: ds.tension !== undefined ? ds.tension : 0.35,
                borderWidth: ds.borderWidth || 3,
                pointBackgroundColor: ds.color || c.line,
                pointBorderColor: 'transparent',
                pointRadius: ds.pointRadius !== undefined ? ds.pointRadius : 3,
                pointHoverRadius: 6,
            };
        });

        new Chart(ctx, {
            type: 'line',
            data: { labels: labels, datasets: chartDatasets },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: {
                        display: datasets.length > 1,
                        position: 'top',
                        labels: {
                            color: getComputedStyle(document.documentElement).getPropertyValue('--text-secondary').trim() || '#666',
                            font: { size: 13, weight: '600' },
                            padding: 16,
                            usePointStyle: true,
                        }
                    }
                },
                scales: {
                    x: {
                        grid: { color: 'rgba(128,128,128,0.1)', drawBorder: false },
                        ticks: {
                            color: getComputedStyle(document.documentElement).getPropertyValue('--text-secondary').trim() || '#666',
                            font: { size: 12, weight: '600' }
                        },
                        border: { display: false }
                    },
                    y: {
                        grid: { color: 'rgba(128,128,128,0.1)', drawBorder: false },
                        ticks: {
                            color: getComputedStyle(document.documentElement).getPropertyValue('--text-secondary').trim() || '#666',
                            font: { size: 12, weight: '600' },
                            callback: function(v) { return '{{Y_SUFFIX}}' ? v + '{{Y_SUFFIX}}' : v; }
                        },
                        border: { display: false }
                    }
                }
            }
        });
    </script>
</body>
</html>
